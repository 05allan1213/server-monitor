# ============================================
# Secret - 敏感信息存储
# ============================================
# 存储敏感信息，如密码、密钥等
# 使用方式：在 Pod 中通过 secretKeyRef 引用
# 
# 注意：生产环境建议使用 Sealed Secrets 或外部密钥管理服务
# ============================================

apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
type: Opaque                       # 不透明类型，存储任意数据
stringData:                        # stringData 会自动 base64 编码
  MYSQL_ROOT_PASSWORD: root123     # MySQL root 用户密码
  MYSQL_PASSWORD: "12345678"       # MySQL 普通用户密码
  DB_USER: monody                     # 数据库用户名
  DB_PASSWORD: "12345678"          # 数据库密码
