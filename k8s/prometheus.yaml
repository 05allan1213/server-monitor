# ============================================
# Prometheus 配置与部署
# ============================================
# 包含三部分：
# 1. ConfigMap - Prometheus 抓取配置
# 2. Deployment - Prometheus 部署
# 3. Service - Prometheus 服务暴露
# ============================================

# ------------------------------------------
# 1. Prometheus 配置（ConfigMap）
# ------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    # 全局配置
    global:
      scrape_interval: 5s          # 每 5 秒抓取一次指标

    # ============================================
    # Prometheus Scrape 配置说明
    # ============================================
    # scrape_configs 定义了 Prometheus 从哪些目标抓取指标
    # 
    # 常用配置项：
    # - job_name: 任务名称，用于标识抓取目标
    # - scrape_interval: 抓取间隔（可覆盖全局配置）
    # - metrics_path: 指标路径（默认 /metrics）
    # - static_configs: 静态目标配置
    #   - targets: 目标地址列表（格式：host:port）
    #   - labels: 自定义标签
    #
    # 示例：抓取多个目标
    # scrape_configs:
    #   - job_name: 'my-app'
    #     static_configs:
    #       - targets: ['app1:9090', 'app2:9090']
    #         labels:
    #           env: production
    #
    # 示例：使用服务发现（Kubernetes）
    # scrape_configs:
    #   - job_name: 'kubernetes-pods'
    #     kubernetes_sd_configs:
    #       - role: pod
    # ============================================
    scrape_configs:
      - job_name: 'server-probe'   # 任务名称
        static_configs:
          - targets: ['server-probe:9090']  # 抓取目标：server-probe 服务的 9090 端口

---
# ------------------------------------------
# 2. Prometheus 部署（Deployment）
# ------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
spec:
  replicas: 1                       # 副本数
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:latest  # Prometheus 官方镜像
          ports:
            - containerPort: 9090   # Prometheus 默认端口
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus/prometheus.yml  # 挂载配置文件
              subPath: prometheus.yml
      volumes:
        - name: config
          configMap:
            name: prometheus-config  # 引用上面的 ConfigMap

---
# ------------------------------------------
# 3. Prometheus 服务（Service）
# ------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: prometheus
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090                    # 服务端口
      targetPort: 9090              # 容器端口
      nodePort: 30090               # NodePort（外部访问端口，范围 30000-32767）
  type: NodePort                    # 服务类型：NodePort 允许外部访问
