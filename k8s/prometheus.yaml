# ============================================
# Prometheus 配置与部署
# ============================================
# 包含三部分：
# 1. ConfigMap - Prometheus 抓取配置
# 2. Deployment - Prometheus 部署
# 3. Service - Prometheus 服务暴露
# ============================================

# ------------------------------------------
# 1. Prometheus 配置（ConfigMap）
# ------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
      evaluation_interval: 5s

    rule_files:
      - /etc/prometheus/rules/*.yml

    alerting:
      alertmanagers:
        - static_configs:
            - targets: ['alertmanager:9093']

    scrape_configs:
      - job_name: 'server-probe'
        metrics_path: /metrics
        static_configs:
          - targets: ['server-probe:9090']

---
# ------------------------------------------
# 2. Prometheus 规则配置（ConfigMap）
# ------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-rules
data:
  alerts.yml: |
    groups:
      - name: server-probe-alerts
        rules:
          - alert: HighCPUUsage
            expr: server_monitor_cpu_usage_percent > 80
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "High CPU usage on {{ $labels.instance }}"
              description: "CPU usage is above 80% for 2 minutes."

          - alert: HighMemoryUsage
            expr: server_monitor_memory_usage_percent > 85
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "High memory usage on {{ $labels.instance }}"
              description: "Memory usage is above 85% for 2 minutes."

---
# ------------------------------------------
# 3. Prometheus 部署（Deployment）
# ------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
spec:
  replicas: 1                       # 副本数
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
            - name: rules
              mountPath: /etc/prometheus/rules
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: rules
          configMap:
            name: prometheus-rules

---
# ------------------------------------------
# 4. Prometheus 服务（Service）
# ------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: prometheus
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
      nodePort: 30090
  type: NodePort
