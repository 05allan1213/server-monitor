# ============================================
# alert-service 告警事件消费与状态管理
# ============================================
# 第三阶段：Kafka 消费 → 告警去重/聚合 → 状态管理
# ============================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: alert-service
  namespace: server-monitor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alert-service
  template:
    metadata:
      labels:
        app: alert-service
    spec:
      containers:
        - name: alert-service
          image: 05allan1213/alert-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: TZ
              value: Asia/Shanghai
            - name: LISTEN_ADDR
              value: ":8080"
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: monitor-config
                  key: KAFKA_BROKERS
            - name: KAFKA_GROUP_ID
              value: alert-service
            - name: REDIS_ADDR
              valueFrom:
                configMapKeyRef:
                  name: monitor-config
                  key: REDIS_ADDR
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: monitor-secret
                  key: REDIS_PASSWORD
            - name: TRACE_OTLP_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: monitor-config
                  key: TRACE_OTLP_ENDPOINT
            - name: TRACE_SAMPLE_RATE
              valueFrom:
                configMapKeyRef:
                  name: monitor-config
                  key: TRACE_SAMPLE_RATE
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: monitor-config
                  key: LOG_LEVEL
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: alert-service
  namespace: server-monitor
spec:
  selector:
    app: alert-service
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
