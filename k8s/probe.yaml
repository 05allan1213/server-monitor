# ============================================
# server-probe 部署配置
# ============================================
# 监控探针：采集 CPU/内存指标，暴露 Prometheus 指标
# ============================================

# ------------------------------------------
# Deployment - 部署控制器
# ------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: server-probe
spec:
  replicas: 1
  selector:
    matchLabels:
      app: server-probe
  template:
    metadata:
      labels:
        app: server-probe
    spec:
      containers:
        - name: server-probe
          image: goproject-server-probe:v2
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9090
              name: metrics
          livenessProbe:
            httpGet:
              path: /metrics
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /metrics
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 5
          env:
            - name: TZ
              value: Asia/Shanghai

---
# ------------------------------------------
# Service - 服务发现
# ------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: server-probe
spec:
  selector:
    app: server-probe
  ports:
    - port: 9090
      targetPort: 9090
      name: metrics
  type: ClusterIP
