# ============================================
# server-probe 部署配置
# ============================================
# 监控探针：采集宿主机指标，暴露 Prometheus 指标
# ============================================

# ------------------------------------------
# DaemonSet - 每个 Node 部署一个监控探针
# ------------------------------------------
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: server-probe
spec:
  selector:
    matchLabels:
      app: server-probe
  template:
    metadata:
      labels:
        app: server-probe
    spec:
      containers:
        - name: server-probe
          image: goproject-server-probe:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9090
              name: metrics
          volumeMounts:
            - name: proc
              mountPath: /host/proc
              readOnly: true
            - name: sys
              mountPath: /host/sys
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /metrics
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /metrics
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 5
          env:
            - name: TZ
              value: Asia/Shanghai
            - name: LISTEN_ADDR
              valueFrom:
                configMapKeyRef:
                  name: monitor-config
                  key: PROBE_LISTEN_ADDR
            - name: METRICS_PATH
              valueFrom:
                configMapKeyRef:
                  name: monitor-config
                  key: PROBE_METRICS_PATH
            - name: SCRAPE_INTERVAL
              valueFrom:
                configMapKeyRef:
                  name: monitor-config
                  key: PROBE_SCRAPE_INTERVAL
            - name: HOST_PROC
              value: /host/proc
            - name: HOST_SYS
              value: /host/sys
      volumes:
        - name: proc
          hostPath:
            path: /proc
            type: Directory
        - name: sys
          hostPath:
            path: /sys
            type: Directory

---
# ------------------------------------------
# Service - 服务发现
# ------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: server-probe
spec:
  selector:
    app: server-probe
  ports:
    - port: 9090
      targetPort: 9090
      name: metrics
  type: ClusterIP
