# ============================================
# MySQL 部署配置
# ============================================
# 数据库：存储 server_metrics 监控数据
# ============================================

# ------------------------------------------
# Deployment - 部署控制器
# ------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
spec:
  replicas: 1                       # 副本数（MySQL 单实例）
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0          # MySQL 官方镜像
          ports:
            - containerPort: 3306   # MySQL 默认端口
          env:
            # 从 Secret 读取 root 密码
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_ROOT_PASSWORD
            # 从 ConfigMap 读取数据库名
            - name: MYSQL_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: mysql-config
                  key: MYSQL_DATABASE
            # 从 Secret 读取普通用户名
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: DB_USER
            # 从 Secret 读取普通用户密码
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_PASSWORD

---
# ------------------------------------------
# Service - 服务发现
# ------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: mysql
spec:
  selector:
    app: mysql
  ports:
    - port: 3306                    # 服务端口
      targetPort: 3306              # 容器端口
  type: ClusterIP                   # 服务类型：ClusterIP 仅集群内访问
