# ============================================
# Ingress - 入口路由配置
# ============================================
# 将外部 HTTP 请求路由到集群内 Service
# 前置条件：集群需安装 Ingress Controller（如 nginx-ingress）
# ============================================

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: monitor-ingress
  namespace: server-monitor
spec:
  ingressClassName: nginx          # Ingress Controller 类型
  tls:
    - hosts:
        - monitor.local
      secretName: monitor-tls
  rules:
    - host: monitor.local          # 域名（需配置本地 hosts 或 DNS）
      http:
        paths:
          - path: /                # 匹配所有路径
            pathType: Prefix       # 路径匹配类型：前缀匹配
            backend:
              service:
                name: server-web   # 后端 Service 名称
                port:
                  number: 8080     # 后端 Service 端口

# ============================================
# 使用说明
# ============================================
# 1. 安装 nginx-ingress-controller
# 2. 配置本地 hosts: <节点IP> monitor.local
# 3. 访问 https://monitor.local
#    - 前端页面: /
#    - API: /api/v1/*
#    - WebSocket: /ws/alerts
# ============================================
