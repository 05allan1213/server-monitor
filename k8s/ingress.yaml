apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: monitor-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: monitor.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: server-web
                port:
                  number: 8080
