# ============================================
# server-web 部署配置
# ============================================
# Web API 服务：查询 Prometheus，提供监控接口
# ============================================

# ------------------------------------------
# Deployment - 部署控制器
# ------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: server-web
spec:
  replicas: 1                       # 副本数
  selector:
    matchLabels:
      app: server-web
  template:
    metadata:
      labels:
        app: server-web
    spec:
      containers:
        - name: server-web
          image: goproject-server-web:latest  # 镜像地址（需替换为实际镜像）
          imagePullPolicy: IfNotPresent       # 镜像拉取策略
          ports:
            - containerPort: 8080   # Web 服务端口
          # 资源限制（用于 HPA 自动扩缩容）
          resources:
            requests:                # 最小资源请求
              cpu: 50m               # 50 毫核
              memory: 64Mi           # 64 MiB
            limits:                  # 最大资源限制
              cpu: 200m              # 200 毫核
              memory: 128Mi          # 128 MiB
          # 存活探针：检测容器是否存活
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          # 就绪探针：检测容器是否就绪
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          env:
            - name: TZ
              value: Asia/Shanghai   # 时区设置
            - name: GIN_MODE
              value: release
            - name: PROMETHEUS_URL
              value: http://prometheus:9090
            - name: READY_TIMEOUT_SECONDS
              value: "3"

---
# ------------------------------------------
# Service - 服务发现
# ------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: server-web
spec:
  selector:
    app: server-web
  ports:
    - port: 8080                    # 服务端口
      targetPort: 8080              # 容器端口
      nodePort: 30080               # NodePort（外部访问端口）
  type: NodePort                    # 服务类型：NodePort 允许外部访问
