# ============================================
# server-web 部署配置
# ============================================
# Web API 服务：查询 Prometheus，提供监控接口
# ============================================

# ------------------------------------------
# Deployment - 部署控制器
# ------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: server-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: server-web
  template:
    metadata:
      labels:
        app: server-web
    spec:
      containers:
        - name: server-web
          image: goproject-server-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          env:
            - name: TZ
              value: Asia/Shanghai
            - name: GIN_MODE
              value: release
            - name: PROMETHEUS_URL
              value: http://prometheus:9090
            - name: REDIS_ADDR
              value: redis:6379
            - name: READY_TIMEOUT_SECONDS
              value: "3"
            - name: REQUEST_TIMEOUT_SECONDS
              value: "5"
            - name: HOSTS_CACHE_TTL_SECONDS
              value: "30"

---
# ------------------------------------------
# Service - 服务发现
# ------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: server-web
spec:
  selector:
    app: server-web
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
  type: NodePort
