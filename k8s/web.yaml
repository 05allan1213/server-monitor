# ============================================
# server-web 部署配置
# ============================================
# Web API 服务：查询 Prometheus，提供监控接口
# ============================================

# ------------------------------------------
# Deployment - 部署控制器
# ------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: server-web
  namespace: server-monitor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: server-web
  template:
    metadata:
      labels:
        app: server-web
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - server-web
                topologyKey: kubernetes.io/hostname
      containers:
        - name: server-web
          image: goproject-server-web:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          env:
            - name: TZ
              value: Asia/Shanghai
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: monitor-config
                  key: LOG_LEVEL
            - name: PROMETHEUS_URL
              valueFrom:
                configMapKeyRef:
                  name: monitor-config
                  key: PROMETHEUS_URL
            - name: PROMETHEUS_RELOAD_URL
              valueFrom:
                configMapKeyRef:
                  name: monitor-config
                  key: PROMETHEUS_RELOAD_URL
            - name: ALERT_RULES_FILE_PATH
              valueFrom:
                configMapKeyRef:
                  name: monitor-config
                  key: ALERT_RULES_FILE_PATH
            - name: ALERT_RULE_SYNC_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: monitor-config
                  key: ALERT_RULE_SYNC_ENABLED
            - name: PROMTOOL_PATH
              valueFrom:
                configMapKeyRef:
                  name: monitor-config
                  key: PROMTOOL_PATH
            - name: ALERT_RULE_SYNC_TIMEOUT_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: monitor-config
                  key: ALERT_RULE_SYNC_TIMEOUT_SECONDS
            - name: REDIS_ADDR
              valueFrom:
                configMapKeyRef:
                  name: monitor-config
                  key: REDIS_ADDR
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: monitor-secret
                  key: REDIS_PASSWORD
            - name: MYSQL_HOST
              valueFrom:
                configMapKeyRef:
                  name: monitor-config
                  key: MYSQL_HOST
            - name: MYSQL_PORT
              valueFrom:
                configMapKeyRef:
                  name: monitor-config
                  key: MYSQL_PORT
            - name: MYSQL_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: monitor-config
                  key: MYSQL_DATABASE
            - name: MYSQL_USER
              valueFrom:
                configMapKeyRef:
                  name: monitor-config
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: monitor-secret
                  key: MYSQL_PASSWORD
            - name: MYSQL_STARTUP_TIMEOUT_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: monitor-config
                  key: MYSQL_STARTUP_TIMEOUT_SECONDS
            - name: MYSQL_PING_TIMEOUT_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: monitor-config
                  key: MYSQL_PING_TIMEOUT_SECONDS
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: monitor-secret
                  key: JWT_SECRET
            - name: AUTH_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: monitor-config
                  key: AUTH_ENABLED
            - name: JWT_EXPIRE_HOURS
              valueFrom:
                configMapKeyRef:
                  name: monitor-config
                  key: JWT_EXPIRE_HOURS
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: monitor-secret
                  key: ADMIN_PASSWORD
            - name: GIN_MODE
              valueFrom:
                configMapKeyRef:
                  name: monitor-config
                  key: GIN_MODE
            - name: CORS_ALLOWED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: monitor-config
                  key: CORS_ALLOWED_ORIGINS
            - name: RATE_LIMIT_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: monitor-config
                  key: RATE_LIMIT_ENABLED
            - name: RATE_LIMIT_REQUESTS
              valueFrom:
                configMapKeyRef:
                  name: monitor-config
                  key: RATE_LIMIT_REQUESTS
            - name: RATE_LIMIT_WINDOW_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: monitor-config
                  key: RATE_LIMIT_WINDOW_SECONDS
            - name: READY_TIMEOUT_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: monitor-config
                  key: READY_TIMEOUT_SECONDS
            - name: REQUEST_TIMEOUT_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: monitor-config
                  key: REQUEST_TIMEOUT_SECONDS
            - name: HOSTS_CACHE_TTL_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: monitor-config
                  key: HOSTS_CACHE_TTL_SECONDS
            - name: TRACE_OTLP_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: monitor-config
                  key: TRACE_OTLP_ENDPOINT
            - name: TRACE_SAMPLE_RATE
              valueFrom:
                configMapKeyRef:
                  name: monitor-config
                  key: TRACE_SAMPLE_RATE
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: monitor-config
                  key: KAFKA_BROKERS

---
# ------------------------------------------
# Service - 服务发现
# ------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: server-web
  namespace: server-monitor
spec:
  selector:
    app: server-web
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
  type: NodePort
