# ============================================
# ConfigMap - 配置中心
# ============================================
# 存储非敏感配置信息
# 使用方式：在 Pod 中通过 configMapKeyRef 引用
# ============================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: monitor-config
data:
  PROMETHEUS_URL: http://prometheus:9090
  REDIS_ADDR: redis:6379
  GIN_MODE: release
  READY_TIMEOUT_SECONDS: "3"
  REQUEST_TIMEOUT_SECONDS: "5"
  HOSTS_CACHE_TTL_SECONDS: "30"
