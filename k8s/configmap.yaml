# ============================================
# ConfigMap - 配置中心
# ============================================
# 存储非敏感配置信息
# 使用方式：在 Pod 中通过 configMapKeyRef 引用
# ============================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: monitor-config
  namespace: server-monitor
data:
  PROMETHEUS_URL: http://prometheus:9090
  PROMETHEUS_RELOAD_URL: http://prometheus:9090/-/reload
  PROMTOOL_PATH: /usr/local/bin/promtool
  ALERT_RULE_SYNC_TIMEOUT_SECONDS: "10"
  REDIS_ADDR: redis:6379
  MYSQL_HOST: mysql
  MYSQL_PORT: "3306"
  MYSQL_DATABASE: server_monitor
  MYSQL_USER: server_monitor
  MYSQL_STARTUP_TIMEOUT_SECONDS: "10"
  MYSQL_PING_TIMEOUT_SECONDS: "3"
  AUTH_ENABLED: "true"
  JWT_EXPIRE_HOURS: "24"
  CORS_ALLOWED_ORIGINS: ""
  RATE_LIMIT_ENABLED: "true"
  RATE_LIMIT_REQUESTS: "120"
  RATE_LIMIT_WINDOW_SECONDS: "60"
  GIN_MODE: release
  READY_TIMEOUT_SECONDS: "3"
  REQUEST_TIMEOUT_SECONDS: "5"
  HOSTS_CACHE_TTL_SECONDS: "30"
  LOG_LEVEL: info
  TRACE_OTLP_ENDPOINT: jaeger:4317
  TRACE_SAMPLE_RATE: "1.0"
  KAFKA_BROKERS: kafka:9092
  PROBE_LISTEN_ADDR: ":9090"
  PROBE_METRICS_PATH: "/metrics"
  PROBE_SCRAPE_INTERVAL: "5"
