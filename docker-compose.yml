# ============================================
# Docker Compose 编排配置
# ============================================
# 启动命令: docker-compose up -d
# 停止命令: docker-compose down
# 查看日志: docker-compose logs -f
# ============================================

services:
  # ------------------------------------------
  # Redis 缓存与 Pub/Sub
  # ------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD:-server-monitor-local-redis}
      - --appendonly
      - "yes"
      - --maxmemory
      - 96mb
      - --maxmemory-policy
      - allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-server-monitor-local-redis}
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=\"$${REDIS_PASSWORD:-server-monitor-local-redis}\" redis-cli ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: 128M

  # ------------------------------------------
  # server-probe 监控探针
  # ------------------------------------------
  server-probe:
    build: ./server-probe
    restart: unless-stopped
    ports:
      - "9090:9090"
    environment:
      LISTEN_ADDR: ":9090"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:9090/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: 128M

  # ------------------------------------------
  # Prometheus 监控服务
  # ------------------------------------------
  prometheus:
    image: prom/prometheus:v2.51.0
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/alerts.yml:/etc/prometheus/rules/alerts.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=6h"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:9090/-/healthy"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 1G

  # ------------------------------------------
  # AlertManager 告警管理
  # ------------------------------------------
  alertmanager:
    image: prom/alertmanager:v0.27.0
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ./docker/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:9093/-/healthy"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: 256M

  # ------------------------------------------
  # server-web Web 展示服务
  # ------------------------------------------
  server-web:
    build:
      context: .
      dockerfile: server-web/Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PROMETHEUS_URL: http://prometheus:9090
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-server-monitor-local-redis}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      RATE_LIMIT_ENABLED: "true"
      RATE_LIMIT_REQUESTS: "120"
      RATE_LIMIT_WINDOW_SECONDS: "60"
      GIN_MODE: release
    depends_on:
      redis:
        condition: service_healthy
      prometheus:
        condition: service_healthy
      alertmanager:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: 256M

volumes:
  redis-data:
