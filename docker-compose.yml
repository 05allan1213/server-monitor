services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: monitor_db
      MYSQL_USER: xiu
      MYSQL_PASSWORD: 12345678
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123"]
      interval: 5s
      timeout: 3s
      retries: 10

  server-probe:
    build: ./server-probe
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: xiu
      DB_PASSWORD: 12345678
      DB_NAME: monitor_db
    depends_on:
      mysql:
        condition: service_healthy

  server-web:
    build: ./server-web
    ports:
      - "8080:8080"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: xiu
      DB_PASSWORD: 12345678
      DB_NAME: monitor_db
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data: