# ============================================
# Docker Compose 编排配置
# ============================================
# 启动命令: docker-compose up -d
# 停止命令: docker-compose down
# 查看日志: docker-compose logs -f
# ============================================

services:
  # ------------------------------------------
  # Redis 缓存与 Pub/Sub
  # ------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD:-server-monitor-local-redis}
      - --appendonly
      - "yes"
      - --maxmemory
      - 96mb
      - --maxmemory-policy
      - allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-server-monitor-local-redis}
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=\"$${REDIS_PASSWORD:-server-monitor-local-redis}\" redis-cli ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: 128M

  # ------------------------------------------
  # Jaeger 链路追踪
  # ------------------------------------------
  jaeger:
    image: cr.jaegertracing.io/jaegertracing/jaeger:2.17.0
    restart: unless-stopped
    ports:
      - "127.0.0.1:16686:16686"
      - "127.0.0.1:4317:4317"
      - "127.0.0.1:4318:4318"
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M

  # ------------------------------------------
  # server-probe 监控探针
  # ------------------------------------------
  server-probe:
    build: ./server-probe
    restart: unless-stopped
    ports:
      - "9090:9090"
    environment:
      LISTEN_ADDR: ":9090"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      TRACE_OTLP_ENDPOINT: jaeger:4317
      TRACE_SAMPLE_RATE: ${TRACE_SAMPLE_RATE:-1.0}
    depends_on:
      jaeger:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:9090/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: 128M

  # ------------------------------------------
  # Prometheus 监控服务
  # ------------------------------------------
  prometheus:
    image: prom/prometheus:v2.51.0
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/alerts.yml:/etc/prometheus/rules/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=6h"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:9090/-/healthy"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 1G

  # ------------------------------------------
  # AlertManager 告警管理
  # ------------------------------------------
  alertmanager:
    image: prom/alertmanager:v0.27.0
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ./docker/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:9093/-/healthy"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: 256M

  # ------------------------------------------
  # Grafana 可视化大盘
  # ------------------------------------------
  grafana:
    image: grafana/grafana:10.4.0
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-server-monitor-local-grafana}
    volumes:
      - ./docker/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./docker/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/api/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

  # ------------------------------------------
  # Elasticsearch 日志存储
  # ------------------------------------------
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
      cluster.name: sm-logs
    ports:
      - "127.0.0.1:9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 2G

  # ------------------------------------------
  # Elasticsearch 日志索引初始化
  # ------------------------------------------
  elasticsearch-init:
    image: curlimages/curl:8.8.0
    restart: "no"
    environment:
      ELASTICSEARCH_URL: http://elasticsearch:9200
      ILM_POLICY_NAME: sm-logs-policy
      INDEX_TEMPLATE_NAME: sm-logs-template
    volumes:
      - ./docker/elasticsearch:/init:ro
    entrypoint: ["/bin/sh", "/init/init.sh"]
    depends_on:
      elasticsearch:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: 64M

  # ------------------------------------------
  # Kibana 日志查询
  # ------------------------------------------
  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    restart: unless-stopped
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "127.0.0.1:5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:5601/api/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 1G

  # ------------------------------------------
  # Fluent Bit 日志采集
  # ------------------------------------------
  fluent-bit:
    image: fluent/fluent-bit:3.1.4
    restart: unless-stopped
    volumes:
      - ./docker/fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./docker/fluent-bit/parsers.conf:/fluent-bit/etc/parsers.conf:ro
      - ${DOCKER_CONTAINER_LOG_PATH:-/var/lib/docker/containers}:/var/log/docker:ro
    depends_on:
      elasticsearch-init:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: 128M

  # ------------------------------------------
  # server-web Web 展示服务
  # ------------------------------------------
  server-web:
    build:
      context: .
      dockerfile: server-web/Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PROMETHEUS_URL: http://prometheus:9090
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-server-monitor-local-redis}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      RATE_LIMIT_ENABLED: "true"
      RATE_LIMIT_REQUESTS: "120"
      RATE_LIMIT_WINDOW_SECONDS: "60"
      GIN_MODE: release
      LOG_LEVEL: ${LOG_LEVEL:-info}
      TRACE_OTLP_ENDPOINT: jaeger:4317
      TRACE_SAMPLE_RATE: ${TRACE_SAMPLE_RATE:-1.0}
    depends_on:
      jaeger:
        condition: service_started
      redis:
        condition: service_healthy
      prometheus:
        condition: service_healthy
      alertmanager:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: 256M

volumes:
  redis-data:
  prometheus-data:
  grafana-data:
  elasticsearch-data:
