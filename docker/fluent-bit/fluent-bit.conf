[SERVICE]
    Flush         5
    Daemon        Off
    Log_Level     info
    Parsers_File  parsers.conf

[INPUT]
    Name              tail
    Path              /var/log/docker/*/*-json.log
    Parser            docker_json
    Tag               docker.*
    Mem_Buf_Limit     5MB
    Skip_Long_Lines   On
    Refresh_Interval  10

[FILTER]
    Name          parser
    Match         docker.*
    Key_Name      log
    Parser        app_json
    Reserve_Data  On
    Preserve_Key  Off

[OUTPUT]
    Name                es
    Match               *
    Host                elasticsearch
    Port                9200
    Logstash_Format     On
    Logstash_Prefix     sm-logs
    Logstash_DateFormat %Y.%m.%d
    Replace_Dots        On
    Suppress_Type_Name  On
    Retry_Limit         False
    tls                 Off
