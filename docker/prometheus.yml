global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: 'server-probe'
    metrics_path: /metrics
    static_configs:
      - targets: ['server-probe:9090']

  - job_name: 'server-web'
    metrics_path: /metrics
    static_configs:
      - targets: ['server-web:8080']
