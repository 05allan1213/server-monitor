name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  server-probe:
    name: server-probe checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: server-probe/go.sum

      - name: Install goimports
        run: go install golang.org/x/tools/cmd/goimports@latest

      - name: Goimports
        working-directory: server-probe
        run: test -z "$(goimports -l .)"

      - name: Test
        working-directory: server-probe
        run: go test ./...

      - name: Vet
        working-directory: server-probe
        run: go vet ./...

  server-web:
    name: server-web checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: server-web/go.sum

      - name: Install goimports
        run: go install golang.org/x/tools/cmd/goimports@latest

      - name: Goimports
        working-directory: server-web
        run: test -z "$(goimports -l .)"

      - name: Test
        working-directory: server-web
        run: go test ./...

      - name: Vet
        working-directory: server-web
        run: go vet ./...

  alert-service:
    name: alert-service checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: alert-service/go.sum

      - name: Install goimports
        run: go install golang.org/x/tools/cmd/goimports@latest

      - name: Goimports
        working-directory: alert-service
        run: test -z "$(goimports -l .)"

      - name: Test
        working-directory: alert-service
        run: go test ./...

      - name: Vet
        working-directory: alert-service
        run: go vet ./...

  frontend:
    name: frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

  prometheus:
    name: prometheus config checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Prometheus config
        run: |
          docker run --rm \
            --entrypoint promtool \
            -v "${{ github.workspace }}/docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro" \
            -v "${{ github.workspace }}/docker/alerts.yml:/etc/prometheus/rules/alerts.yml:ro" \
            prom/prometheus:v2.51.0 \
            check config /etc/prometheus/prometheus.yml

      - name: Check Prometheus rules
        run: |
          docker run --rm \
            --entrypoint promtool \
            -v "${{ github.workspace }}/docker/alerts.yml:/etc/prometheus/alerts.yml:ro" \
            prom/prometheus:v2.51.0 \
            check rules /etc/prometheus/alerts.yml

  helm:
    name: helm chart checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Lint chart
        run: helm lint charts/server-monitor

  docker-build:
    name: docker build checks
    runs-on: ubuntu-latest
    needs:
      - server-probe
      - server-web
      - alert-service
      - frontend
      - prometheus
      - helm
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build probe image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./server-probe/Dockerfile
          push: false
          tags: server-probe:ci

      - name: Build web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./server-web/Dockerfile
          push: false
          tags: server-web:ci

      - name: Build alert-service image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./alert-service/Dockerfile
          push: false
          tags: alert-service:ci

  push-images:
    name: push images
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - docker-build
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push probe
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./server-probe/Dockerfile
          push: true
          tags: |
            05allan1213/server-probe:latest
            05allan1213/server-probe:${{ github.sha }}

      - name: Build and push web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./server-web/Dockerfile
          push: true
          tags: |
            05allan1213/server-web:latest
            05allan1213/server-web:${{ github.sha }}

      - name: Build and push alert-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./alert-service/Dockerfile
          push: true
          tags: |
            05allan1213/alert-service:latest
            05allan1213/alert-service:${{ github.sha }}
