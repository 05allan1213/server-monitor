basePath: /api/v1
definitions:
  handlers.loginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    type: object
  handlers.response:
    properties:
      data: {}
      error:
        type: string
      status:
        type: string
    type: object
  webhook.AlertRecord:
    properties:
      annotations:
        additionalProperties:
          type: string
        type: object
      endsAt:
        type: string
      fingerprint:
        type: string
      generatorURL:
        type: string
      labels:
        additionalProperties:
          type: string
        type: object
      startsAt:
        type: string
      status:
        type: string
    type: object
  webhook.AlertmanagerWebhookRequest:
    properties:
      alerts:
        items:
          $ref: '#/definitions/webhook.AlertRecord'
        type: array
      commonAnnotations:
        additionalProperties:
          type: string
        type: object
      commonLabels:
        additionalProperties:
          type: string
        type: object
      externalURL:
        type: string
      groupLabels:
        additionalProperties:
          type: string
        type: object
      receiver:
        type: string
      status:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: 服务器监控平台 API，提供主机监控、告警管理、规则配置等功能。
  title: Server Monitor API
  version: "1.0"
paths:
  /alerts/active:
    get:
      description: 从 Redis 获取当前活跃的告警列表
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.response'
      security:
      - BearerAuth: []
      summary: 获取活跃告警列表
      tags:
      - alerts
  /alerts/events:
    get:
      description: 查询告警事件历史，支持按状态和严重程度过滤
      parameters:
      - description: 状态过滤 (firing/resolved)
        in: query
        name: status
        type: string
      - description: 严重程度过滤 (critical/warning/info)
        in: query
        name: severity
        type: string
      - description: 搜索关键词
        in: query
        name: search
        type: string
      - description: 页码
        in: query
        name: page
        type: integer
      - description: 每页数量
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.response'
      security:
      - BearerAuth: []
      summary: 获取告警事件列表
      tags:
      - alerts
  /auth/login:
    post:
      consumes:
      - application/json
      description: 使用用户名和密码登录，返回 JWT 令牌
      parameters:
      - description: 登录请求
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.loginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.response'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/handlers.response'
      summary: 用户登录
      tags:
      - auth
  /auth/me:
    get:
      description: 根据 Bearer Token 获取当前登录用户信息
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.response'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/handlers.response'
      security:
      - BearerAuth: []
      summary: 获取当前用户信息
      tags:
      - auth
  /hosts:
    get:
      description: 查询 Prometheus 获取所有监控主机列表
      parameters:
      - description: 主机组名称过滤
        in: query
        name: group
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.response'
      security:
      - BearerAuth: []
      summary: 获取主机列表
      tags:
      - hosts
  /webhook/alertmanager:
    post:
      consumes:
      - application/json
      description: 接收 Alertmanager 发送的告警通知，转发到 Kafka 和 WebSocket
      parameters:
      - description: Alertmanager Webhook 请求
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/webhook.AlertmanagerWebhookRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.response'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/handlers.response'
      summary: Alertmanager Webhook 接收
      tags:
      - webhook
schemes:
- http
- https
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
