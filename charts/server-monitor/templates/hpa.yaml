{{- if and .Values.hpa.enabled .Values.serverWeb.enabled }}
# ============================================
# HorizontalPodAutoscaler (HPA) - 自动扩缩容
# ============================================
# 根据 CPU 使用率自动调整 Pod 副本数
# 前置条件：集群需安装 Metrics Server
# ============================================

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: server-web-hpa
  labels:
    {{- include "server-monitor.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: server-web
  minReplicas: {{ .Values.hpa.minReplicas }}
  maxReplicas: {{ .Values.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.hpa.cpuAverageUtilization }}
{{- end }}
