{{- if .Values.mysql.enabled }}
# ============================================
# MySQL 业务数据库
# ============================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  labels:
    {{- include "server-monitor.labels" . | nindent 4 }}
spec:
  serviceName: mysql
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      {{- with .Values.global.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: mysql
          image: {{ .Values.mysql.image | quote }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          {{- with .Values.global.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            - name: TZ
              value: {{ .Values.global.timezone | quote }}
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secret.name | quote }}
                  key: MYSQL_ROOT_PASSWORD
            - name: MYSQL_DATABASE
              value: {{ .Values.mysql.database | quote }}
            - name: MYSQL_USER
              value: {{ .Values.mysql.user | quote }}
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secret.name | quote }}
                  key: MYSQL_PASSWORD
          ports:
            - containerPort: 3306
          readinessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "127.0.0.1"]
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "127.0.0.1"]
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            requests:
              cpu: {{ .Values.mysql.resources.requests.cpu | quote }}
              memory: {{ .Values.mysql.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.mysql.resources.limits.cpu | quote }}
              memory: {{ .Values.mysql.resources.limits.memory | quote }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          {{- range .Values.mysql.persistence.accessModes }}
          - {{ . | quote }}
          {{- end }}
        resources:
          requests:
            storage: {{ .Values.mysql.persistence.size | quote }}
        {{- if .Values.mysql.persistence.storageClassName }}
        storageClassName: {{ .Values.mysql.persistence.storageClassName | quote }}
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  labels:
    {{- include "server-monitor.labels" . | nindent 4 }}
spec:
  selector:
    app: mysql
  ports:
    - port: 3306
      targetPort: 3306
  type: ClusterIP
{{- end }}
