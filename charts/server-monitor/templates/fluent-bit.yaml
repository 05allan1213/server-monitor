{{- if .Values.fluentBit.enabled }}
# ============================================
# Fluent Bit 日志采集
# ============================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  labels:
    {{- include "server-monitor.labels" . | nindent 4 }}
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         {{ .Values.fluentBit.flushSeconds }}
        Daemon        Off
        Log_Level     {{ .Values.fluentBit.logLevel }}
        Parsers_File  parsers.conf
        HTTP_Server   On
        HTTP_Listen   0.0.0.0
        HTTP_Port     2020

    [INPUT]
        Name              tail
        Path              /var/log/containers/*.log
        Parser            cri
        Tag               kube.*
        Mem_Buf_Limit     5MB
        Skip_Long_Lines   On
        Refresh_Interval  10

    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix     kube.var.log.containers.
        Merge_Log           On
        Merge_Parser        app_json
        Keep_Log            Off
        K8S-Logging.Parser  On
        K8S-Logging.Exclude Off

    [OUTPUT]
        Name                es
        Match               *
        Host                elasticsearch
        Port                {{ .Values.elasticsearch.service.port }}
        Logstash_Format     On
        Logstash_Prefix     sm-logs
        Logstash_DateFormat %Y.%m.%d
        Replace_Dots        On
        Suppress_Type_Name  On
        Retry_Limit         False
        tls                 Off
  parsers.conf: |
    [PARSER]
        Name        cri
        Format      regex
        Regex       ^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<logtag>[^ ]*) (?<log>.*)$
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L%z

    [PARSER]
        Name        app_json
        Format      json
        Time_Key    ts
        Time_Format %Y-%m-%dT%H:%M:%S.%LZ

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fluent-bit
  labels:
    {{- include "server-monitor.labels" . | nindent 4 }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-fluent-bit-read
  labels:
    {{- include "server-monitor.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "namespaces"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-fluent-bit-read
  labels:
    {{- include "server-monitor.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Name }}-fluent-bit-read
subjects:
  - kind: ServiceAccount
    name: fluent-bit
    namespace: {{ .Release.Namespace }}

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluent-bit
  labels:
    {{- include "server-monitor.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app: fluent-bit
  template:
    metadata:
      labels:
        app: fluent-bit
    spec:
      serviceAccountName: fluent-bit
      {{- with .Values.global.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.fluentBit.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if and .Values.elasticsearch.enabled .Values.elasticsearch.init.enabled }}
      initContainers:
        - name: wait-elasticsearch-init
          image: {{ .Values.elasticsearch.init.image | quote }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          command:
            - /bin/sh
            - -ec
            - |
              ES_URL="${ELASTICSEARCH_URL:-http://elasticsearch:9200}"
              ILM_POLICY_NAME="${ILM_POLICY_NAME:-sm-logs-policy}"
              INDEX_TEMPLATE_NAME="${INDEX_TEMPLATE_NAME:-sm-logs-template}"

              attempt=1
              while [ "$attempt" -le 120 ]; do
                if curl -fsS "${ES_URL}/_ilm/policy/${ILM_POLICY_NAME}" >/dev/null \
                  && curl -fsS "${ES_URL}/_index_template/${INDEX_TEMPLATE_NAME}" >/dev/null; then
                  exit 0
                fi
                attempt=$((attempt + 1))
                sleep 2
              done

              echo "Elasticsearch log template or ILM policy is not ready" >&2
              exit 1
          env:
            - name: ELASTICSEARCH_URL
              value: http://elasticsearch:9200
            - name: ILM_POLICY_NAME
              value: {{ .Values.elasticsearch.init.ilmPolicyName | quote }}
            - name: INDEX_TEMPLATE_NAME
              value: {{ .Values.elasticsearch.init.indexTemplateName | quote }}
          resources:
            {{- toYaml .Values.elasticsearch.init.resources | nindent 12 }}
      {{- end }}
      containers:
        - name: fluent-bit
          image: {{ .Values.fluentBit.image | quote }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: 2020
              name: http
          resources:
            {{- toYaml .Values.fluentBit.resources | nindent 12 }}
          volumeMounts:
            - name: var-log
              mountPath: /var/log
              readOnly: true
            - name: docker-containers
              mountPath: /var/lib/docker/containers
              readOnly: true
            - name: fluent-bit-config
              mountPath: /fluent-bit/etc/
      volumes:
        - name: var-log
          hostPath:
            path: {{ .Values.fluentBit.hostLogPath | quote }}
            type: Directory
        - name: docker-containers
          hostPath:
            path: {{ .Values.fluentBit.hostDockerContainersPath | quote }}
            type: DirectoryOrCreate
        - name: fluent-bit-config
          configMap:
            name: fluent-bit-config
{{- end }}
