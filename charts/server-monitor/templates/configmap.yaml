# ============================================
# ConfigMap - 配置中心
# ============================================
# 存储非敏感配置信息
# 使用方式：在 Pod 中通过 configMapKeyRef 引用
# ============================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: monitor-config
  labels:
    {{- include "server-monitor.labels" . | nindent 4 }}
data:
  PROMETHEUS_URL: {{ .Values.config.prometheusUrl | quote }}
  REDIS_ADDR: {{ .Values.config.redisAddr | quote }}
  CORS_ALLOWED_ORIGINS: {{ .Values.config.corsAllowedOrigins | quote }}
  RATE_LIMIT_ENABLED: {{ .Values.rateLimit.enabled | quote }}
  RATE_LIMIT_REQUESTS: {{ .Values.rateLimit.requests | quote }}
  RATE_LIMIT_WINDOW_SECONDS: {{ .Values.rateLimit.windowSeconds | quote }}
  GIN_MODE: {{ .Values.config.ginMode | quote }}
  READY_TIMEOUT_SECONDS: {{ .Values.config.readyTimeoutSeconds | quote }}
  REQUEST_TIMEOUT_SECONDS: {{ .Values.config.requestTimeoutSeconds | quote }}
  HOSTS_CACHE_TTL_SECONDS: {{ .Values.config.hostsCacheTTLSeconds | quote }}
  PROBE_LISTEN_ADDR: {{ .Values.serverProbe.listenAddr | quote }}
  PROBE_METRICS_PATH: {{ .Values.serverProbe.metricsPath | quote }}
  PROBE_SCRAPE_INTERVAL: {{ .Values.serverProbe.scrapeInterval | quote }}
