{{- if .Values.ingress.enabled }}
# ============================================
# Ingress - 入口路由配置
# ============================================
# 将外部 HTTP 请求路由到集群内 Service
# 前置条件：集群需安装 Ingress Controller（如 nginx-ingress）
# ============================================

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: monitor-ingress
  labels:
    {{- include "server-monitor.labels" . | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className | quote }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: {{ .Values.ingress.tls.secretName | quote }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: {{ .Values.ingress.path | quote }}
            pathType: {{ .Values.ingress.pathType }}
            backend:
              service:
                name: server-web
                port:
                  number: {{ .Values.serverWeb.service.port }}

# ============================================
# 使用说明
# ============================================
# 1. 安装 nginx-ingress-controller
# 2. 配置本地 hosts: <节点IP> monitor.local
# 3. 访问 https://monitor.local
#    - 前端页面: /
#    - API: /api/v1/*
#    - WebSocket: /ws/alerts
# ============================================
{{- end }}
