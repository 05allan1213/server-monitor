{{- if .Values.grafana.enabled }}
# ============================================
# Grafana 部署配置
# ============================================
# 可视化仪表盘：展示 Prometheus 指标
# ============================================

# ------------------------------------------
# 1. DataSource Provisioning
# ------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  labels:
    {{- include "server-monitor.labels" . | nindent 4 }}
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
      - name: Elasticsearch
        type: elasticsearch
        access: proxy
        url: http://elasticsearch:9200
        database: sm-logs-*
        jsonData:
          timeField: "@timestamp"
          esVersion: "8.13.0"
          logMessageField: msg
          logLevelField: level
        editable: true

---
# ------------------------------------------
# 2. Dashboard Provider Provisioning
# ------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-providers
  labels:
    {{- include "server-monitor.labels" . | nindent 4 }}
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: server-monitor
        orgId: 1
        folder: Server Monitor
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards

---
# ------------------------------------------
# 3. Dashboard JSON
# ------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  labels:
    {{- include "server-monitor.labels" . | nindent 4 }}
data:
