{{- if .Values.jaeger.enabled }}
# ============================================
# Jaeger 链路追踪
# ============================================
# 接收 OTLP Trace，提供 Jaeger UI 查询
# ============================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: jaeger-config
  labels:
    {{- include "server-monitor.labels" . | nindent 4 }}
data:
  jaeger.yaml: |
    service:
      extensions: [jaeger_storage, jaeger_query]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [jaeger_storage_exporter]

    extensions:
      jaeger_storage:
        backends:
          memory_store:
            memory:
              max_traces: 100000
      jaeger_query:
        storage:
          traces: memory_store
        http:
          endpoint: 0.0.0.0:16686
        grpc:
          endpoint: 0.0.0.0:16685

    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch:

    exporters:
      jaeger_storage_exporter:
        trace_storage: memory_store

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  labels:
    {{- include "server-monitor.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      {{- with .Values.global.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: jaeger
          image: {{ .Values.jaeger.image | quote }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          args:
            - --config=file:/etc/jaeger/jaeger.yaml
          {{- with .Values.global.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: ui
              containerPort: 16686
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
          resources:
            {{- toYaml .Values.jaeger.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /
              port: ui
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: ui
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - name: jaeger-config
              mountPath: /etc/jaeger/jaeger.yaml
              subPath: jaeger.yaml
              readOnly: true
      volumes:
        - name: jaeger-config
          configMap:
            name: jaeger-config

---
apiVersion: v1
kind: Service
metadata:
  name: jaeger
  labels:
    {{- include "server-monitor.labels" . | nindent 4 }}
spec:
  selector:
    app: jaeger
  ports:
    - name: ui
      port: {{ .Values.jaeger.service.uiPort }}
      targetPort: 16686
      {{- if eq .Values.jaeger.service.type "NodePort" }}
      nodePort: {{ .Values.jaeger.service.uiNodePort }}
      {{- end }}
    - name: otlp-grpc
      port: {{ .Values.jaeger.service.otlpGrpcPort }}
      targetPort: 4317
    - name: otlp-http
      port: {{ .Values.jaeger.service.otlpHttpPort }}
      targetPort: 4318
  type: {{ .Values.jaeger.service.type }}
{{- end }}
