{{- if .Values.elasticsearch.enabled }}
# ============================================
# Elasticsearch 日志存储
# ============================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: elasticsearch
  labels:
    {{- include "server-monitor.labels" . | nindent 4 }}
spec:
  serviceName: elasticsearch
  replicas: 1
  selector:
    matchLabels:
      app: elasticsearch
  template:
    metadata:
      labels:
        app: elasticsearch
    spec:
      {{- with .Values.global.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: elasticsearch
          image: {{ .Values.elasticsearch.image | quote }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: 9200
              name: http
          env:
            - name: discovery.type
              value: single-node
            - name: xpack.security.enabled
              value: "false"
            - name: ES_JAVA_OPTS
              value: {{ .Values.elasticsearch.javaOpts | quote }}
            - name: cluster.name
              value: {{ .Values.elasticsearch.clusterName | quote }}
          resources:
            {{- toYaml .Values.elasticsearch.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /_cluster/health?local=true
              port: 9200
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /_cluster/health?local=true
              port: 9200
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          volumeMounts:
            - name: data
              mountPath: /usr/share/elasticsearch/data
      {{- if not .Values.elasticsearch.persistence.enabled }}
      volumes:
        - name: data
          emptyDir: {}
      {{- end }}
  {{- if .Values.elasticsearch.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          {{- toYaml .Values.elasticsearch.persistence.accessModes | nindent 10 }}
        {{- if .Values.elasticsearch.persistence.storageClassName }}
        storageClassName: {{ .Values.elasticsearch.persistence.storageClassName | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.elasticsearch.persistence.size | quote }}
  {{- end }}

---
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch
  labels:
    {{- include "server-monitor.labels" . | nindent 4 }}
spec:
  selector:
    app: elasticsearch
  ports:
    - port: {{ .Values.elasticsearch.service.port }}
      targetPort: 9200
      name: http
  type: {{ .Values.elasticsearch.service.type }}
{{- end }}
