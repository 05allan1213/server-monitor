{{- if .Values.redis.enabled }}
# ============================================
# Redis 部署配置
# ============================================
# 用于告警缓存、Pub/Sub 广播和主机列表缓存
# ============================================

# ------------------------------------------
# PersistentVolumeClaim - Redis 数据
# ------------------------------------------
{{- if .Values.redis.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-data
  labels:
    {{- include "server-monitor.labels" . | nindent 4 }}
spec:
  accessModes:
    {{- toYaml .Values.redis.persistence.accessModes | nindent 4 }}
  resources:
    requests:
      storage: {{ .Values.redis.persistence.size | quote }}
  {{- if .Values.redis.persistence.storageClassName }}
  storageClassName: {{ .Values.redis.persistence.storageClassName | quote }}
  {{- end }}

---
{{- end }}
# ------------------------------------------
# Deployment - 部署控制器
# ------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  labels:
    {{- include "server-monitor.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      {{- with .Values.global.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: redis
          image: {{ .Values.redis.image | quote }}
          {{- with .Values.global.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          command:
            - redis-server
          args:
            - --requirepass
            - $(REDIS_PASSWORD)
            - --appendonly
            - "yes"
            - --maxmemory
            - {{ .Values.redis.maxmemory | quote }}
            - --maxmemory-policy
            - {{ .Values.redis.maxmemoryPolicy | quote }}
          ports:
            - containerPort: 6379
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secret.name | quote }}
                  key: REDIS_PASSWORD
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - REDISCLI_AUTH="$REDIS_PASSWORD" redis-cli ping
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - REDISCLI_AUTH="$REDIS_PASSWORD" redis-cli ping
            initialDelaySeconds: 3
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          {{ if .Values.redis.persistence.enabled }}
          persistentVolumeClaim:
            claimName: redis-data
          {{ else }}
          emptyDir: {}
          {{ end }}

---
# ------------------------------------------
# Service - 服务发现
# ------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: redis
  labels:
    {{- include "server-monitor.labels" . | nindent 4 }}
spec:
  selector:
    app: redis
  ports:
    - port: {{ .Values.redis.service.port }}
      targetPort: 6379
  type: {{ .Values.redis.service.type }}
{{- end }}
