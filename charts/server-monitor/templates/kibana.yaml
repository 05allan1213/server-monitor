{{- if .Values.kibana.enabled }}
# ============================================
# Kibana 日志查询
# ============================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kibana
  labels:
    {{- include "server-monitor.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kibana
  template:
    metadata:
      labels:
        app: kibana
    spec:
      {{- with .Values.global.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: kibana
          image: {{ .Values.kibana.image | quote }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: 5601
              name: http
          env:
            - name: ELASTICSEARCH_HOSTS
              value: http://elasticsearch:9200
          resources:
            {{- toYaml .Values.kibana.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /api/status
              port: 5601
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /api/status
              port: 5601
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6

---
apiVersion: v1
kind: Service
metadata:
  name: kibana
  labels:
    {{- include "server-monitor.labels" . | nindent 4 }}
spec:
  selector:
    app: kibana
  ports:
    - port: {{ .Values.kibana.service.port }}
      targetPort: 5601
      name: http
      {{- if eq .Values.kibana.service.type "NodePort" }}
      nodePort: {{ .Values.kibana.service.nodePort }}
      {{- end }}
  type: {{ .Values.kibana.service.type }}
{{- end }}
